<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Notion Knowledge Assistant MCP cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="180" cy="120" rx="280" ry="220" fill="url(#halo)"/>
  <ellipse cx="660" cy="420" rx="260" ry="200" fill="url(#halo2)"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="720" cy="120" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="120" cy="420" r="2"/><circle cx="200" cy="440" r="2"/>
  </g>

  <!-- central document / notion page -->
  <g transform="translate(300,150)">
    <rect x="0" y="0" width="200" height="240" rx="18" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <rect x="24" y="30" width="120" height="14" rx="7" fill="url(#glow)" opacity="0.9"/>
    <rect x="24" y="66" width="152" height="8" rx="4" fill="#9aa0bd" opacity="0.55"/>
    <rect x="24" y="86" width="152" height="8" rx="4" fill="#9aa0bd" opacity="0.4"/>
    <rect x="24" y="106" width="110" height="8" rx="4" fill="#9aa0bd" opacity="0.4"/>
    <rect x="24" y="138" width="152" height="8" rx="4" fill="#9aa0bd" opacity="0.3"/>
    <rect x="24" y="158" width="132" height="8" rx="4" fill="#9aa0bd" opacity="0.3"/>
    <!-- highlighted retrieved chunk -->
    <rect x="18" y="184" width="164" height="40" rx="10" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-opacity="0.5"/>
    <rect x="30" y="196" width="100" height="7" rx="3.5" fill="#22d3ee" opacity="0.85"/>
    <rect x="30" y="210" width="140" height="6" rx="3" fill="#22d3ee" opacity="0.55"/>
  </g>

  <!-- connector nodes (RAG / semantic graph) -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.6">
    <line x1="300" y1="200" x2="180" y2="150"/>
    <line x1="300" y1="320" x2="170" y2="370"/>
    <line x1="500" y1="200" x2="620" y2="150"/>
    <line x1="500" y1="320" x2="630" y2="360"/>
  </g>
  <g>
    <circle cx="180" cy="150" r="26" fill="#0e1124" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="170" cy="370" r="22" fill="#0e1124" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="620" cy="150" r="22" fill="#0e1124" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="630" cy="360" r="26" fill="#0e1124" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- glyphs -->
    <text x="180" y="156" font-family="monospace" font-size="18" fill="#8b5cf6" text-anchor="middle">{ }</text>
    <text x="170" y="376" font-family="monospace" font-size="15" fill="#22d3ee" text-anchor="middle">⌕</text>
    <text x="620" y="156" font-family="monospace" font-size="15" fill="#22d3ee" text-anchor="middle">∑</text>
    <text x="630" y="366" font-family="monospace" font-size="16" fill="#8b5cf6" text-anchor="middle">db</text>
  </g>

  <!-- title chip -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
    <text x="36" y="22" font-family="monospace" font-size="13" fill="#e7e9f3">MCP server</text>
  </g>
</svg>
