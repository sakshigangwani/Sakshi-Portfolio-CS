<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SQLSense cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="150" cy="120" rx="280" ry="220" fill="url(#halo)"/>
  <ellipse cx="670" cy="410" rx="260" ry="200" fill="url(#halo2)"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="720" cy="120" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="120" cy="420" r="2"/><circle cx="200" cy="440" r="2"/>
  </g>

  <!-- natural language prompt (left) -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="200" height="120" rx="16" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <text x="22" y="30" font-family="monospace" font-size="11" fill="#22d3ee">ask in english</text>
    <rect x="22" y="46" width="156" height="9" rx="4.5" fill="#9aa0bd" opacity="0.5"/>
    <rect x="22" y="66" width="156" height="9" rx="4.5" fill="#9aa0bd" opacity="0.38"/>
    <rect x="22" y="86" width="110" height="9" rx="4.5" fill="#9aa0bd" opacity="0.38"/>
    <rect x="22" y="100" width="44" height="2" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- LLM core (center) -->
  <g transform="translate(340,210)">
    <circle cx="40" cy="40" r="40" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <circle cx="40" cy="40" r="40" fill="url(#halo)" opacity="0.35"/>
    <text x="40" y="38" font-family="monospace" font-size="13" fill="#e7e9f3" text-anchor="middle">LLM</text>
    <text x="40" y="54" font-family="monospace" font-size="8" fill="#9aa0bd" text-anchor="middle">+ RAG</text>
  </g>

  <!-- arrows -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.7">
    <line x1="296" y1="210" x2="338" y2="248"/>
    <line x1="424" y1="248" x2="466" y2="210"/>
  </g>

  <!-- SQL result (right) -->
  <g transform="translate(470,150)">
    <rect x="0" y="0" width="240" height="200" rx="16" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <!-- window dots -->
    <circle cx="20" cy="20" r="4" fill="#8b5cf6"/>
    <circle cx="34" cy="20" r="4" fill="#22d3ee"/>
    <circle cx="48" cy="20" r="4" fill="#9aa0bd" opacity="0.5"/>
    <text x="218" y="24" font-family="monospace" font-size="10" fill="#9aa0bd" text-anchor="end">query.sql</text>
    <!-- SQL code -->
    <text x="20" y="58" font-family="monospace" font-size="12" fill="#8b5cf6">SELECT</text>
    <text x="78" y="58" font-family="monospace" font-size="12" fill="#e7e9f3">name, total</text>
    <text x="20" y="78" font-family="monospace" font-size="12" fill="#8b5cf6">FROM</text>
    <text x="62" y="78" font-family="monospace" font-size="12" fill="#22d3ee">sales</text>
    <text x="20" y="98" font-family="monospace" font-size="12" fill="#8b5cf6">WHERE</text>
    <text x="72" y="98" font-family="monospace" font-size="12" fill="#e7e9f3">total &gt; 1000</text>
    <text x="20" y="118" font-family="monospace" font-size="12" fill="#8b5cf6">ORDER BY</text>
    <text x="100" y="118" font-family="monospace" font-size="12" fill="#e7e9f3">total DESC;</text>
    <!-- result rows -->
    <rect x="20" y="138" width="200" height="1.5" fill="#ffffff" opacity="0.1"/>
    <rect x="20" y="150" width="200" height="9" rx="4.5" fill="#22d3ee" opacity="0.16"/>
    <rect x="20" y="166" width="200" height="9" rx="4.5" fill="#9aa0bd" opacity="0.2"/>
    <rect x="20" y="182" width="150" height="9" rx="4.5" fill="#9aa0bd" opacity="0.16"/>
  </g>

  <!-- title chip -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="220" height="34" rx="17" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
    <text x="36" y="22" font-family="monospace" font-size="13" fill="#e7e9f3">natural language → SQL</text>
  </g>
</svg>
