<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Resume Analyzer cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="160" cy="110" rx="280" ry="220" fill="url(#halo)"/>
  <ellipse cx="660" cy="420" rx="260" ry="200" fill="url(#halo2)"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="720" cy="120" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="120" cy="420" r="2"/><circle cx="200" cy="440" r="2"/>
  </g>

  <!-- resume document (left) -->
  <g transform="translate(120,140)">
    <rect x="0" y="0" width="180" height="230" rx="16" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <rect x="22" y="26" width="90" height="14" rx="7" fill="url(#glow)" opacity="0.9"/>
    <rect x="22" y="58" width="136" height="8" rx="4" fill="#9aa0bd" opacity="0.5"/>
    <rect x="22" y="78" width="136" height="8" rx="4" fill="#9aa0bd" opacity="0.38"/>
    <rect x="22" y="98" width="100" height="8" rx="4" fill="#9aa0bd" opacity="0.38"/>
    <rect x="22" y="128" width="136" height="8" rx="4" fill="#9aa0bd" opacity="0.28"/>
    <rect x="22" y="148" width="120" height="8" rx="4" fill="#9aa0bd" opacity="0.28"/>
    <rect x="22" y="168" width="136" height="8" rx="4" fill="#9aa0bd" opacity="0.28"/>
    <!-- PDF chip -->
    <rect x="118" y="196" width="44" height="20" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.5"/>
    <text x="140" y="210" font-family="monospace" font-size="10" fill="#8b5cf6" text-anchor="middle">PDF</text>
  </g>

  <!-- arrow to analyzer -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.7">
    <line x1="300" y1="255" x2="360" y2="255"/>
  </g>
  <text x="330" y="240" font-family="monospace" font-size="11" fill="#9aa0bd" text-anchor="middle">LLM</text>

  <!-- analysis panel (right) -->
  <g transform="translate(370,120)">
    <rect x="0" y="0" width="300" height="270" rx="18" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>

    <!-- match score ring -->
    <circle cx="64" cy="70" r="40" fill="none" stroke="#1b2040" stroke-width="10"/>
    <circle cx="64" cy="70" r="40" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="251" stroke-dashoffset="60" transform="rotate(-90 64 70)"/>
    <text x="64" y="68" font-family="monospace" font-size="22" fill="#e7e9f3" text-anchor="middle">76%</text>
    <text x="64" y="86" font-family="monospace" font-size="9" fill="#9aa0bd" text-anchor="middle">match</text>

    <!-- missing skills -->
    <text x="128" y="44" font-family="monospace" font-size="11" fill="#22d3ee">missing skills</text>
    <rect x="128" y="54" width="60" height="20" rx="10" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="158" y="68" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">Docker</text>
    <rect x="194" y="54" width="74" height="20" rx="10" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="231" y="68" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">GraphQL</text>
    <rect x="128" y="82" width="80" height="20" rx="10" fill="#22d3ee" opacity="0.12" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="168" y="96" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">Kubernetes</text>

    <!-- suggestions -->
    <text x="24" y="150" font-family="monospace" font-size="11" fill="#8b5cf6">suggestions</text>
    <rect x="24" y="162" width="252" height="8" rx="4" fill="#9aa0bd" opacity="0.4"/>
    <rect x="24" y="180" width="252" height="8" rx="4" fill="#9aa0bd" opacity="0.3"/>
    <rect x="24" y="198" width="200" height="8" rx="4" fill="#9aa0bd" opacity="0.3"/>
    <rect x="24" y="224" width="252" height="8" rx="4" fill="#9aa0bd" opacity="0.22"/>
    <rect x="24" y="242" width="180" height="8" rx="4" fill="#9aa0bd" opacity="0.22"/>
  </g>

  <!-- title chip -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="200" height="34" rx="17" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#22d3ee"/>
    <text x="36" y="22" font-family="monospace" font-size="13" fill="#e7e9f3">resume × JD match</text>
  </g>
</svg>
