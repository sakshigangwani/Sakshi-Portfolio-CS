<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowSync multi-agent AI health assistant cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="160" cy="100" rx="280" ry="220" fill="url(#halo)"/>
  <ellipse cx="660" cy="430" rx="260" ry="200" fill="url(#halo2)"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="720" cy="120" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="120" cy="420" r="2"/><circle cx="200" cy="440" r="2"/>
  </g>

  <!-- user query chip -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <circle cx="22" cy="20" r="6" fill="#22d3ee"/>
    <text x="38" y="25" font-family="monospace" font-size="13" fill="#e7e9f3">query</text>
  </g>

  <!-- router node -->
  <g transform="translate(250,100)">
    <rect x="0" y="0" width="140" height="80" rx="16" fill="#0e1124" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="70" y="34" font-family="monospace" font-size="14" fill="#8b5cf6" text-anchor="middle">Router</text>
    <text x="70" y="56" font-family="monospace" font-size="11" fill="#9aa0bd" text-anchor="middle">LLM + keyword</text>
  </g>

  <!-- query -> router -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.7">
    <line x1="180" y1="140" x2="250" y2="140"/>
  </g>

  <!-- router -> three agents -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.55">
    <line x1="390" y1="130" x2="500" y2="80"/>
    <line x1="390" y1="140" x2="500" y2="180"/>
    <line x1="390" y1="150" x2="500" y2="280"/>
  </g>

  <!-- three specialized agents -->
  <g>
    <rect x="500" y="52" width="170" height="56" rx="14" fill="#0e1124" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="585" y="78" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">Medical</text>
    <text x="585" y="96" font-family="monospace" font-size="10" fill="#9aa0bd" text-anchor="middle">temp 0.4 · k=3</text>

    <rect x="500" y="152" width="170" height="56" rx="14" fill="#0e1124" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="585" y="178" font-family="monospace" font-size="13" fill="#8b5cf6" text-anchor="middle">Symptom</text>
    <text x="585" y="196" font-family="monospace" font-size="10" fill="#9aa0bd" text-anchor="middle">temp 0.3 · k=4</text>

    <rect x="500" y="252" width="170" height="56" rx="14" fill="#0e1124" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="585" y="278" font-family="monospace" font-size="13" fill="#22d3ee" text-anchor="middle">Lifestyle</text>
    <text x="585" y="296" font-family="monospace" font-size="10" fill="#9aa0bd" text-anchor="middle">temp 0.5 · k=3</text>
  </g>

  <!-- agents -> retriever / vector store -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.5">
    <line x1="585" y1="108" x2="400" y2="370"/>
    <line x1="585" y1="208" x2="400" y2="370"/>
    <line x1="585" y1="308" x2="400" y2="370"/>
  </g>

  <!-- retriever / pinecone -->
  <g transform="translate(280,350)">
    <rect x="0" y="0" width="240" height="64" rx="16" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>
    <text x="120" y="28" font-family="monospace" font-size="13" fill="#e7e9f3" text-anchor="middle">RAG · Pinecone</text>
    <text x="120" y="48" font-family="monospace" font-size="10" fill="#9aa0bd" text-anchor="middle">all-MiniLM-L6-v2 · 384d · cosine</text>
  </g>

  <!-- title chip -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="200" height="34" rx="17" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#8b5cf6"/>
    <text x="36" y="22" font-family="monospace" font-size="13" fill="#e7e9f3">multi-agent RAG</text>
  </g>
</svg>
