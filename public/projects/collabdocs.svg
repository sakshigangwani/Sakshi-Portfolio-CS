<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CollabDocs real-time collaborative document editor cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d1c"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="160" cy="110" rx="280" ry="220" fill="url(#halo)"/>
  <ellipse cx="660" cy="420" rx="260" ry="200" fill="url(#halo2)"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="720" cy="120" r="2"/><circle cx="640" cy="80" r="2"/>
    <circle cx="720" cy="420" r="2"/><circle cx="120" cy="420" r="2"/><circle cx="200" cy="440" r="2"/>
  </g>

  <!-- collaborative document -->
  <g transform="translate(230,110)">
    <rect x="0" y="0" width="340" height="290" rx="18" fill="#0e1124" stroke="url(#glow)" stroke-width="1.5"/>

    <!-- toolbar dots -->
    <circle cx="26" cy="26" r="5" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="44" cy="26" r="5" fill="#22d3ee" opacity="0.6"/>
    <circle cx="62" cy="26" r="5" fill="#9aa0bd" opacity="0.4"/>

    <!-- presence avatar stack (top-right) -->
    <circle cx="300" cy="26" r="11" fill="#0e1124" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="284" cy="26" r="11" fill="#0e1124" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="268" cy="26" r="11" fill="#0e1124" stroke="#f0abfc" stroke-width="2"/>

    <!-- title -->
    <rect x="26" y="58" width="150" height="16" rx="8" fill="url(#glow)" opacity="0.9"/>

    <!-- body lines -->
    <rect x="26" y="96" width="288" height="9" rx="4.5" fill="#9aa0bd" opacity="0.45"/>
    <rect x="26" y="118" width="288" height="9" rx="4.5" fill="#9aa0bd" opacity="0.35"/>

    <!-- caret A (violet) on line -->
    <rect x="222" y="113" width="2.5" height="20" rx="1" fill="#8b5cf6"/>
    <rect x="226" y="106" width="42" height="14" rx="4" fill="#8b5cf6" opacity="0.9"/>
    <text x="247" y="116" font-family="monospace" font-size="9" fill="#0b0d1c" text-anchor="middle">Priya</text>

    <rect x="26" y="140" width="220" height="9" rx="4.5" fill="#9aa0bd" opacity="0.35"/>

    <!-- highlighted selection (cyan) -->
    <rect x="24" y="166" width="180" height="14" rx="4" fill="#22d3ee" opacity="0.16"/>
    <rect x="26" y="184" width="288" height="9" rx="4.5" fill="#9aa0bd" opacity="0.3"/>

    <!-- caret B (cyan) -->
    <rect x="140" y="179" width="2.5" height="20" rx="1" fill="#22d3ee"/>
    <rect x="144" y="172" width="46" height="14" rx="4" fill="#22d3ee" opacity="0.9"/>
    <text x="167" y="182" font-family="monospace" font-size="9" fill="#0b0d1c" text-anchor="middle">Marco</text>

    <rect x="26" y="206" width="260" height="9" rx="4.5" fill="#9aa0bd" opacity="0.28"/>
    <rect x="26" y="228" width="288" height="9" rx="4.5" fill="#9aa0bd" opacity="0.22"/>
    <rect x="26" y="250" width="180" height="9" rx="4.5" fill="#9aa0bd" opacity="0.22"/>
  </g>

  <!-- sync / CRDT nodes -->
  <g stroke="url(#glow)" stroke-width="1.5" opacity="0.5">
    <line x1="230" y1="200" x2="120" y2="250"/>
    <line x1="570" y1="200" x2="680" y2="250"/>
  </g>
  <g>
    <circle cx="120" cy="250" r="24" fill="#0e1124" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="120" y="255" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">CRDT</text>
    <circle cx="680" cy="250" r="24" fill="#0e1124" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="680" y="255" font-family="monospace" font-size="13" fill="#8b5cf6" text-anchor="middle">⇄</text>
  </g>

  <!-- title chip -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="210" height="34" rx="17" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#8b5cf6"/>
    <text x="36" y="22" font-family="monospace" font-size="13" fill="#e7e9f3">real-time editor</text>
  </g>
</svg>
